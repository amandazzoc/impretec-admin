<div class="content-wrapper">
  <header class="page-header">
    <h1>Dashboard</h1>
    <p>Arraste os pedidos entre as colunas para atualizar o status</p>
  </header>

  <div class="board thin-scrollbar" cdkDropListGroup>
    @for (column of statusColumns; track column.status) {
      <app-kanban-column
        [label]="column.label"
        [status]="column.status"
        [orders]="columns()[column.status]"
        (dropped)="handleDrop($event)"
      />
    }
  </div>
</div>
