<div class="content-wrapper">
  <header class="page-header">
    <h1>Kanban</h1>
    <p>Arraste os pedidos entre as colunas para atualizar o status</p>
  </header>

  <div class="board thin-scrollbar" cdkDropListGroup>
    @if (isLoading()) {
      <div class="loading-board">
        @for (column of statusColumns; track column.status) {
          <div class="skeleton-column">
            <div class="skeleton-header">
              <div class="skeleton-block skeleton-title"></div>
              <div class="skeleton-block skeleton-badge"></div>
            </div>
            <div class="skeleton-block skeleton-total"></div>
            @for (i of [1, 2, 3]; track i) {
              <div class="skeleton-card">
                <div class="skeleton-block skeleton-card-title"></div>
                <div class="skeleton-block skeleton-card-line"></div>
                <div class="skeleton-block skeleton-card-line short"></div>
              </div>
            }
          </div>
        }
      </div>
    } @else {
      @for (column of statusColumns; track column.status) {
        <app-kanban-column
          [label]="column.label"
          [status]="column.status"
          [orders]="columns()[column.status]"
          (dropped)="handleDrop($event)"
          (orderSelected)="handleOrderSelected($event)"
        />
      }
    }
  </div>

  @if (selectedOrder()) {
    <app-order-details-modal
      [order]="selectedOrder()!"
      (closed)="closeOrderDetails()"
      (itemChecked)="handleItemChecked($event)"
      (editRequested)="openEditModal()"
    />
  }

  @if (editingOrder()) {
    <app-order-edit-modal
      [order]="editingOrder()!"
      (closed)="closeEditModal()"
      (saved)="handleOrderSaved($event)"
    />
  }
</div>
