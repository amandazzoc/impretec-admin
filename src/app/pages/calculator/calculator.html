<div class="content-wrapper">
  <header class="page-header">
    <h1>Orçamento Rápido</h1>
    <p>Calcule os custos de produção e o preço final da peça</p>
  </header>

  <div class="page-grid">
    <form [formGroup]="form" class="main-column">
      <app-card title="Dados da peça">
        <div class="fields-row">
          <app-form-field label="Tempo de impressão (horas):">
            <input type="number" formControlName="timeHours" min="0" step="0.1" />
          </app-form-field>

          <app-form-field label="Peso do filamento (g):">
            <input type="number" formControlName="weightG" min="0" step="0.1" />
          </app-form-field>

          <app-form-field label="Custo do rolo 1kg (R$):">
            <input type="number" formControlName="filamentCostPerKg" min="0" step="0.01" />
          </app-form-field>
        </div>
      </app-card>

      <app-card title="Material e energia">
        <div class="fields">
          <div class="fields-row">
            <app-form-field label="Valor da embalagem (R$):" [fullWidth]="true">
              <input type="number" formControlName="packagingCost" min="0" step="0.01" />
            </app-form-field>
          </div>
  
          <div class="fields-row">
            <app-form-field label="Potência da impressora (kW):">
              <input type="number" formControlName="printerPowerW" min="0" step="0.01" />
            </app-form-field>
  
            <app-form-field label="Custo da energia (R$/kWh):">
              <input type="number" formControlName="kwhCost" min="0" step="0.01" />
            </app-form-field>
          </div>
        </div>
      </app-card>

      <app-card title="Acabamento e riscos">
        <div class="fields">
          <app-checkbox-field label="Peça precisa de pintura?">
            <input type="checkbox" formControlName="needPaint" />
         </app-checkbox-field>
          @if (form.get('needPaint')?.value) {
            <div class="fields-row">
              <app-form-field label="Tempo de pintura (horas):">
                <input type="number" formControlName="hoursPaint" />
              </app-form-field>
  
              <app-form-field label="Valor da hora de pintura (R$):">
                <input type="number" formControlName="costHourPaint" />
              </app-form-field>
            </div>
          }
  
          <app-checkbox-field label="Risco alto de falha? (+20% custo)">
            <input type="checkbox" formControlName="riskFailure" />
          </app-checkbox-field>
        </div>
      </app-card>

      <app-card title="Negócio">
        <div class="fields-row">
          <app-form-field label="Margem de lucro (%):" [fullWidth]="true">
            <input type="number" formControlName="profitMargin" />
          </app-form-field>
        </div>
      </app-card>
    </form>

    <aside class="summary-column">
      <h2 class="summary-title">Resumo do orçamento</h2>

      <app-summary-card label="Custo total de produção:" [value]="'R$ ' + result().costProduction" />

      <app-summary-card
        label="Preço de venda sugerido:"
        [value]="'R$ ' + result().suggestedPrice"
        [highlight]="true"
      />
    </aside>
  </div>
</div>
