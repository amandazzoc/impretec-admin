<div class="content-wrapper">
  <header class="page-header">
    <h1>Novo pedido</h1>
    <p>Cadastre os dados do cliente e adicione os itens do pedido</p>
  </header>

  <div class="page-grid">
    <div class="main-column">
      <app-card title="Dados do pedido">
        <div class="fields-row">
          <app-form-field label="Nome do cliente:">
            <input
              type="text"
              [ngModel]="clientName()"
              (ngModelChange)="clientName.set($event)"
              placeholder="Ex: João Silva"
            />
          </app-form-field>

          <app-form-field label="Prazo:">
            <input type="date" [ngModel]="deadline()" (ngModelChange)="deadline.set($event)" />
          </app-form-field>
        </div>
      </app-card>

      <app-card title="Itens do pedido">
        <div class="fields">
          <div class="fields-row">
            <app-form-field label="Descrição:" [fullWidth]="true">
              <input
                type="text"
                [ngModel]="descriptionItem()"
                (ngModelChange)="descriptionItem.set($event)"
                placeholder="Ex: Suporte de celular"
              />
            </app-form-field>
          </div>

          <div class="fields-row">
            <app-form-field label="Valor (R$):">
              <input
                type="number"
                min="0"
                step="0.01"
                [ngModel]="priceItem()"
                (ngModelChange)="priceItem.set($event)"
              />
            </app-form-field>

            <app-form-field label="Quantidade:">
              <input
                type="number"
                min="1"
                step="1"
                [ngModel]="quantityItem()"
                (ngModelChange)="quantityItem.set($event)"
              />
            </app-form-field>

            <app-form-field label="Observação:">
              <input
                type="text"
                [ngModel]="observationsItem()"
                (ngModelChange)="observationsItem.set($event)"
                placeholder="Opcional"
              />
            </app-form-field>
          </div>

          <app-button variant="outline" [disabled]="!canAddItem()" (clicked)="handleAddItem()">
            + Adicionar ao pedido
          </app-button>
        </div>

        <div class="itens-wrapper">
          <app-order-items [items]="items()" (removeItem)="handleRemoveItem($event)" />
        </div>
      </app-card>
    </div>

    <aside class="summary-column">
      <h2 class="summary-title">Resumo do pedido</h2>

      <app-summary-card label="Quantidade total de itens:" [value]="totalQuantity().toString()" />

      <app-summary-card
        label="Valor total do pedido:"
        [value]="totalPriceFormatted()"
        [highlight]="true"
      />

      <app-button
        [isLoading]="isLoading()"
        [disabled]="!canSubmitOrder() || isLoading()"
        (clicked)="handleSubmitOrder()"
      >
        Salvar pedido
      </app-button>

      @if (submitError()) {
        <p class="error-message">Não foi possível salvar o pedido. Tente novamente.</p>
      }
    </aside>
  </div>
</div>
