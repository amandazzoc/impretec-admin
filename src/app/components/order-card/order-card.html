<div class="order-card" (click)="handleClick()">
  <p class="order-client">{{ order().clientName }}</p>

  <div class="order-meta">
    <span class="order-deadline">{{ deadlineFormatted() }}</span>
    <span class="order-checked-count" [class.all-done]="allChecked()">
      {{ checkedLabel() }}
    </span>
  </div>

  <p class="order-total">{{ totalFormatted() }}</p>
</div>
