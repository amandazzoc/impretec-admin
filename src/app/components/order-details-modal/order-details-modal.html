<app-modal [title]="order().clientName" (closed)="handleClosed()">
  
  <div class="details-header">
    <div class="details-section">
      <div class="detail-row">
        <span class="detail-label">Status:</span>
        <span class="detail-value">{{ statusLabel() }}</span>
      </div>

      <div class="detail-row">
        <span class="detail-label">Prazo:</span>
        <span class="detail-value">{{ deadlineFormatted() }}</span>
      </div>
    </div>

    <button class="icon-btn edit-order-btn" (click)="handleEditClick()" title="Editar pedido">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"></path>
        <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
      </svg>
    </button>
  </div>

  <h3 class="details-subtitle">Itens do pedido</h3>

  <div class="details-items">
    @for (item of order().items; track item.id) {
      <div class="detail-item-row" [class.is-checked]="item.isChecked">
        <div class="item-main">
          <app-checkbox-field
            [label]="item.description"
            [description]="item.observations"
          >
            <input
              type="checkbox"
              class="item-checkbox"
              [checked]="item.isChecked"
              (change)="handleItemCheck(item, $event)"
            />
          </app-checkbox-field>
        </div>

        <span class="item-quantity">{{ item.quantity }}x</span>
        <span class="item-subtotal">{{ formatItemSubtotal(item) }}</span>
      </div>
    }
  </div>

  </app-modal>
