<button
  class="menu-toggle"
  (click)="toggleSidebar()"
  [attr.aria-expanded]="isOpen()"
  aria-label="Toggle menu"
>
  <span class="hamburger-icon" [class.open]="isOpen()"></span>
</button>

<div class="sidebar-overlay" [class.visible]="isOpen()" (click)="closeSidebar()"></div>

<aside class="sidebar" [style.height]="authService.isLoggedIn() ? '100vh' : 'calc(100vh - 41px)'" [class.open]="isOpen()" [class.collapsed]="isCollapsed()">
  <div class="logo-container">
    @if (!isCollapsed()) {
      <h2>ImpreTEC</h2>
      <p>Painel de Controle</p>
    }
    @if (isCollapsed()) {
      <h2 class="logo-short">IT</h2>
    }
  </div>

  <nav class="menu">
  @for (item of menuItems; track item.route) {
      <a [routerLink]="item.route" routerLinkActive="active" class="menu-item" (click)="closeSidebar()">
          <span class="menu-icon">
              <ng-container *ngComponentOutlet="item.icon; inputs: { size: 20 }"></ng-container>
          </span>

          <span class="menu-label">{{ item.label }}</span>
      </a>
  }
  </nav>

  @if (authService.isLoggedIn()) {
    <button class="logout-btn" (click)="handleLogout()">Sair</button>
  }

  <button
    type="button"
    class="collapse-toggle"
    (click)="toggleCollapse()"
    [attr.aria-expanded]="!isCollapsed()"
    aria-label="Recolher ou expandir menu"
  >
    <span class="chevron-icon" [class.collapsed]="isCollapsed()"></span>
  </button>
</aside>
