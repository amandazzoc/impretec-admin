<button
    class="menu-toggle"
    (click)="toggleSidebar()"
    [attr.aria-expanded]="isOpen()"
    aria-label="Toggle menu"
>
    <span class="hamburger-icon" [class.open]="isOpen()"></span>
</button>

<aside class="sidebar" [class.open]="isOpen()">
    <div class="logo-container">
        <h2>ImpreTEC</h2>
        <p>Painel de Controle</p>
    </div>

    <nav class="menu">
        <a 
            routerLink="/dashboard" 
            routerLinkActive="active" 
            class="menu-item"
            (click)="closeSidebar()"
        >
            <span>Dashboard</span>
        </a>

        <a 
            routerLink="/novo-pedido" 
            routerLinkActive="active" 
            class="menu-item" 
            (click)="closeSidebar()"
        >
            <span>Novo Pedido</span>
        </a>

        <a 
            routerLink="/orcamento" 
            routerLinkActive="active" 
            class="menu-item" 
            (click)="closeSidebar()"
        >
            <span>Orcamento</span>
        </a>
    </nav>
</aside>
